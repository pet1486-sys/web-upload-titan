<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบศูนย์ควบคุมบอทข้อมูลหลังบ้าน</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-update { width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">📊 ระบบศูนย์ควบคุมและอัปเดตข้อมูล</h1>
        <p class="text-muted">คลิกเพื่อสั่งให้บอทดึงข้อมูลล่าสุดเข้าสู่ Google BigQuery</p>
    </div>

    <div class="row g-4">
        <!-- บอทตัวที่ 1: SKU Stock -->
        <div class="col-md-6">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="fw-bold mb-0">📦 ข้อมูลสินค้าคงเหลือ (SKU)</h3>
                </div>
                <p>สถานะของระบบ: <span class="badge bg-success">พร้อมใช้งาน</span></p>
                <p class="text-muted" id="sku-time">กำลังโหลดเวลาอัปเดตล่าสุด...</p>
                <button class="btn btn-primary btn-update py-2" onclick="runBot('run_data_bot.yml', 'sku-time')">⚙️ กดอัปเดต SKU ตอนนี้</button>
            </div>
        </div>

        <!-- บอทตัวที่ 2: ยอดขาย (Sales) -->
        <div class="col-md-6">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="fw-bold mb-0">💰 ข้อมูลยอดขายรายวัน (Sales)</h3>
                </div>
                <p>สถานะของระบบ: <span class="badge bg-success">พร้อมใช้งาน</span></p>
                <p class="text-muted" id="sales-time">กำลังโหลดเวลาอัปเดตล่าสุด...</p>
                <button class="btn btn-success btn-update py-2" onclick="runBot('run_sales_bot.yml', 'sales-time')">💸 กดอัปเดตยอดขายตอนนี้</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GITHUB_USERNAME = "pet1486-sys";
    const GITHUB_REPO = "bot-Actions";
    let SAVED_TOKEN = ""; // ตัวแปรสำหรับจำรหัส Token ชั่วคราวในเบราว์เซอร์

    // ฟังก์ชันถามรหัส Token (ถ้ายังไม่มีการกรอก)
    function checkToken() {
        if (!SAVED_TOKEN) {
            SAVED_TOKEN = prompt("🔒 กรุณาใส่ GitHub Personal Access Token ของคุณเพื่อดึงข้อมูลหรือสั่งงานระบบ:");
        }
        return SAVED_TOKEN;
    }

    // ฟังก์ชันสั่งให้ GitHub Actions ทำงานเมื่อกดปุ่ม
    function runBot(workflowFile, elementId) {
        const token = checkToken();
        if (!token) {
            alert("⚠️ ปฏิเสธการทำงาน: จำเป็นต้องกรอก Token ครับ");
            return;
        }

        const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/actions/workflows/${workflowFile}/dispatches`;
        
        fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ ref: 'main' })
        })
        .then(response => {
            if (response.status === 204) {
                alert("🚀 สั่งบอทรันสำเร็จแล้ว! ข้อมูลจะอัปเดตเข้า BigQuery ภายใน 2-3 นาทีครับ");
                document.getElementById(elementId).innerText = "กำลังดำเนินการรันบอทล่าสุด...";
                // โหลดเวลาใหม่หลังจากสั่งรันไปสักพัก
                setTimeout(() => fetchLastRunTime(workflowFile, elementId), 10000);
            } else {
                alert("เกิดข้อผิดพลาด: รหัส Token อาจจะผิด หรือสิทธิ์ไม่ถูกต้อง");
                SAVED_TOKEN = ""; // ล้างค่าเผื่อกรอกผิด
            }
        })
        .catch(error => console.error('Error:', error));
    }

    // ฟังก์ชันดึงเวลาที่บอทรันล่าสุด (ปรับปรุงให้รองรับ Repo Private)
    function fetchLastRunTime(workflowFile, elementId) {
        const token = checkToken();
        if (!token) {
            document.getElementById(elementId).innerText = "กรุณากรอก Token เพื่อดูเวลาอัปเดต";
            return;
        }

        const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/actions/workflows/${workflowFile}/runs?status=success&per_page=1`;
        
        fetch(url, {
            headers: { 'Authorization': `token ${token}` }
        })
        .then(response => response.json())
        .then(data => {
            if (data.workflow_runs && data.workflow_runs.length > 0) {
                const lastRun = new Date(data.workflow_runs[0].updated_at);
                const formattedDate = lastRun.toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });
                document.getElementById(elementId).innerText = `รันสำเร็จล่าสุดเมื่อ: ${formattedDate}`;
            } else {
                document.getElementById(elementId).innerText = "ยังไม่มีประวัติการรันที่สำเร็จ";
            }
        })
        .catch(error => {
            document.getElementById(elementId).innerText = "ไม่สามารถดึงข้อมูลเวลาได้";
        });
    }

    // เรียกทำงานดึงเวลาทันทีเมื่อโหลดหน้าเว็บ
    window.onload = function() {
        fetchLastRunTime('run_data_bot.yml', 'sku-time');
        fetchLastRunTime('run_sales_bot.yml', 'sales-time');
    }
</script>
</body>
</html>
